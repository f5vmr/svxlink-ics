#
# ICS ADS1015 audio mapping
# 4 RX inputs + 4 TX outputs
#

# ---------- RX INPUTS (ADC -> SvxLink) ----------

pcm.rx1 {
    type plug
    slave {
        pcm "hw:Loopback,1,0"
        rate 16000
        channels 1
    }
}

pcm.rx2 {
    type plug
    slave {
        pcm "hw:Loopback,1,1"
        rate 16000
        channels 1
    }
}

pcm.rx3 {
    type plug
    slave {
        pcm "hw:Loopback,1,2"
        rate 16000
        channels 1
    }
}

pcm.rx4 {
    type plug
    slave {
        pcm "hw:Loopback,1,3"
        rate 16000
        channels 1
    }
}

# ---------- TX OUTPUTS (SvxLink -> ADC path) ----------

pcm.tx1 {
    type plug
    slave {
        pcm "hw:Loopback,2,0"
        rate 16000
        channels 1
    }
}

pcm.tx2 {
    type plug
    slave {
        pcm "hw:Loopback,2,1"
        rate 16000
        channels 1
    }
}

pcm.tx3 {
    type plug
    slave {
        pcm "hw:Loopback,2,2"
        rate 16000
        channels 1
    }
}

pcm.tx4 {
    type plug
    slave {
        pcm "hw:Loopback,2,3"
        rate 16000
        channels 1
    }
}

#
# Optional default (safe fallback)
#

pcm.!default {
    type plug
    slave.pcm "rx1"
}

ctl.!default {
    type hw
    card Loopback
}

